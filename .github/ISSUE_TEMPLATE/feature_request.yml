name: Feature request
description: Propose an enhancement to the skill, CLI helper, or repository automation
title: "[feat]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.
        Clear use-cases and acceptance criteria help us ship faster.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: "Today I can't easily ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added/changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or competing approach you've tried.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of what "done" looks like.
      placeholder: |
        - [ ] New command supports ...
        - [ ] README updated with ...
        - [ ] Dry-run behavior documented

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
