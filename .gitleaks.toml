# yaml-language-server: $schema=https://www.schemastore.org/gitleaks.json

title = "Nick2bad4u shared Gitleaks configuration"

[extend]
    path = "node_modules/gitleaks-config-nick2bad4u/gitleaks.toml"

[[allowlists]]
    description = "Ignore local scratch command output"
    paths       = [ '''^temp/''' ]

[[allowlists]]
    description = "Ignore documented test and API identifiers"
    targetRules = [ "nick2bad4u-sensitive-env-vars" ]
    regexTarget = "secret"
    regexes     = [ '''^(?:Get-Secret|authScheme|auth_scheme=)$''' ]
